#APPLICATION_NAME
spring.application.name=prompt-better

#SERVER_PORT
server.port=${SERVER_PORT:8080}

#MySQL
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#AI
api.key=${API_KEY}
api.base-url=https://api.groq.com/openai/v1/chat/completions
ai.model=llama-3.1-8b-instant

#JPA
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.sql.init.mode=never
spring.sql.init.schema-locations=classpath:script.sql

#JWT
jwt.secret=${PROMPTBETTER_JWT_SECRET}
jwt.expiration=86400000

#CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

#ACTUATOR
management.endpoints.web.exposure.include=health,info,metrics,loggers,caches,env
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

#Application info
info.app.name=PromptBetter
info.app.version=1.0.0
info.app.description=AI Prompt Engineering Practice Platform
management.info.env.enabled=true

#RATELIMITER
app.submissionIntervalMs=10000



