#APPLICATION_NAME
spring.application.name=prompt-better

#SERVER_PORT
server.port=${SERVER_PORT:8080}

#MySQL
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#AI
api.key=${API_KEY}
api.base-url=https://api.groq.com/openai/v1/chat/completions
ai.model=llama-3.1-8b-instant

#JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.continue-on-error=true

#JWT
jwt.secret=${PROMPTBETTER_JWT_SECRET}
jwt.expiration=86400000

#CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

#ACTUATOR
management.endpoints.web.exposure.include=health,info,metrics,loggers,caches,env
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

#Application info
info.app.name=PromptBetter
info.app.version=1.0.0
info.app.description=AI Prompt Engineering Practice Platform
management.info.env.enabled=true

#RATELIMITER
app.submissionIntervalMs=10000

#EVALUATION
app.evaluation.teaching-point-weight=0.8
app.evaluation.general-weight=0.2
app.evaluation.hard-cap-when-missed=60
app.evaluation.fact-extractor-temperature=0.1
app.evaluation.coach-temperature=0.2


