#APPLICATION_NAME
spring.application.name=prompt-better

#SERVER_PORT
server.port=8080

#MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/promptbetter
spring.datasource.username=root
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


#AI
api.key=${API_KEY}
api.base-url=https://api.groq.com/openai/v1/chat/completions
ai.model=llama-3.1-8b-instant


#JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.sql.init.mode=never
spring.sql.init.schema-locations=classpath:script.sql

#JWT
jwt.secret=${PROMPTBETTER_JWT_SECRET}
jwt.expiration=86400000

#CORS
# For development: use * to allow all origins
# For production: specify comma-separated origins (e.g., https://yourdomain.com,https://app.yourdomain.com)
cors.allowed-origins=*
# While production should specify allowed origins, for development we can allow all origins with *

#ACTUATOR

#Expose useful endpoints for monitoring and management
management.endpoints.web.exposure.include=health,info,metrics,loggers,caches,env
management.endpoint.health.show-details=always
# Enable Kubernetes probes
management.endpoint.health.probes.enabled=true

#Application info
info.app.name=PromptBetter
info.app.version=1.0.0
info.app.description=AI Prompt Engineering Practice Platform
# Enable environment info endpoint
management.info.env.enabled=true

#RATELIMITER
app.submissionIntervalMs=10000



